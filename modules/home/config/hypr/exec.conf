exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Pin workspaces to monitors at startup
exec-once = sleep 2 && hyprctl dispatch moveworkspacetomonitor 2 HDMI-A-1 && hyprctl dispatch moveworkspacetomonitor 3 HDMI-A-1 && hyprctl dispatch moveworkspacetomonitor 10 HDMI-A-1

exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = hyprshell run
exec-once = wl-paste --watch cliphist store

# Idle: lock after 5min, displays off after 10min, lock before sleep
exec-once = swayidle -w timeout 300 'hyprlock' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'hyprlock'

exec-once = hyprctl setcursor rose-pine-hyprcursor 24
exec-once = discord --start-minimized
exec-once = [workspace special:spotify silent] spotify
exec-once = [workspace special:terminal silent] kitty
exec-once = streamdeck -n
