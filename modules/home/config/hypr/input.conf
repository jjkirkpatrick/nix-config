input {
    kb_layout = gb
    kb_options = grp:alt_caps_toggle
    numlock_by_default = true
    repeat_delay = 300
    # 1: full focus-follows-mouse — focus (incl. keyboard) follows the cursor on
    # hover. NOTE: with multiboxed Eve clients this can let the cursor drifting
    # across a window edge steal keyboard focus from another client ("keyboard
    # not working"). If that recurs, set this back to 2 (focus on click only).
    follow_mouse = 1
    float_switch_override_focus = 0
    mouse_refocus = 1
    sensitivity = 0
    
    touchpad {
        natural_scroll = true
    }
}
