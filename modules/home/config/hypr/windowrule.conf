# prevent apps from maximizing themselves
windowrule = suppress_event maximize class:.*

# floating windows
windowrule = float true class:^(Viewnior)$
windowrule = float true class:^(mpv)$
windowrule = float true class:^(zenity)$
windowrule = float true class:^(org.gnome.FileRoller)$
windowrule = float true class:^(org.pulseaudio.pavucontrol)$
windowrule = float true class:^(file_progress)$
windowrule = float true class:^(confirm)$
windowrule = float true class:^(dialog)$
windowrule = float true class:^(download)$
windowrule = float true class:^(notification)$
windowrule = float true class:^(error)$
windowrule = float true class:^(confirmreset)$
windowrule = float true title:^(Volume Control)$
windowrule = float true title:^(Picture-in-Picture)$
windowrule = float true title:^(Open File)$
windowrule = float true title:^(File Upload)$
windowrule = float true title:^(branchdialog)$
windowrule = float true title:^(Confirm to replace files)$
windowrule = float true title:^(File Operation Progress)$

# calendar popup (gsimplecal) — float, position below cursor, no animation
windowrule = float true class:^(gsimplecal)$
windowrule = move cursor -100 5 class:^(gsimplecal)$
windowrule = no_anim true class:^(gsimplecal)$

# logout window
windowrule = fullscreen true class:^(wlogout)$
windowrule = float true class:^(wlogout)$

# floating with pins
windowrule = float true title:^(Picture-in-Picture)$
windowrule = pin true title:^(Picture-in-Picture)$
windowrule = float true class:^(steam)$ title:^(Friends List)$
windowrule = float true class:^(spotify)$

# positioning and sizing
windowrule = size 700 450 title:^(Volume Control)$
windowrule = move 40 55% title:^(Volume Control)$
windowrule = size 850 500 class:^(zenity)$

# opacity overrides for terminals and specific apps
windowrule = match:class ^(kitty)$, opacity 0.85 override 0.75 override
windowrule = match:class ^(cursor)$, opacity 0.90 override 0.80 override
windowrule = match:class ^(brave-browser)$, opacity 0.95 override 0.85 override

# fully opaque windows
windowrule = match:title ^(Picture-in-Picture)$, opacity 1.0 override 1.0 override
windowrule = match:title ^(.*mpv.*)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(evince)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(discord)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(spotify)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(vlc)$, opacity 1.0 override 1.0 override

# workspace assignments
windowrule = workspace 1 silent class:^(brave-browser)$
windowrule = workspace 2 silent class:^(discord)$
windowrule = workspace 3 class:^(evince)$

# xwaylandvideobridge (screen sharing helper — keep invisible and non-interfering)
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override
windowrule = animation false class:^(xwaylandvideobridge)$
windowrule = match:class ^(xwaylandvideobridge)$, rounding 0

# chromium context menu fixes (empty class/title = context menus)
windowrule = opaque true class:^()$ title:^()$

# single window optimizations (no border/rounding when only one tiled window)
workspace = w[t1], gapsout:0, gapsin:0, border:false, rounding:false
workspace = w[tg1], gapsout:0, gapsin:0, border:false, rounding:false
workspace = f[1], gapsout:0, gapsin:0, border:false, rounding:false
