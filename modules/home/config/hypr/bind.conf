$mainMod = SUPER

binds {
    movefocus_cycles_fullscreen = true
}

# application launchers
bind = $mainMod, Return, exec, kitty
bind = ALT, Return, exec, [float; size 1111 700] kitty
bind = $mainMod SHIFT, Return, exec, [fullscreen] kitty
bind = $mainMod, B, exec, [workspace 1 silent] brave
bind = $mainMod, S, exec, [workspace 2 silent] spotify
bind = $mainMod, R, exec, pkill fuzzel || fuzzel
bind = ,F4, exec, pkill fuzzel || fuzzel
bind = $mainMod, E, exec, nemo
bind = ALT, E, exec, hyprctl dispatch exec '[float; size 1111 700] nemo'

bind = $mainMod SHIFT, R, exec, dev-layout

# window management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, Space, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, X, layoutmsg, togglesplit

# system controls
bind = $mainMod, Escape, exec, hyprlock
bind = ALT, Escape, exec, hyprlock
bind = $mainMod SHIFT, Escape, exec, wlogout
bind = CTRL SHIFT, Escape, exec, hyprctl dispatch exec '[workspace 9] missioncenter'

# utilities
bind = $mainMod, slash, exec, hyprctl -j binds | jq -r '.[] | "\(if .modmask==64 then "SUPER" elif .modmask==65 then "SUPER+SHIFT" elif .modmask==68 then "SUPER+CTRL" elif .modmask==72 then "SUPER+ALT" elif .modmask==8 then "ALT" elif .modmask==5 then "CTRL+SHIFT" elif .modmask==12 then "ALT+CTRL" elif .modmask==0 then "     " else (.modmask|tostring) end) + \(.key)  →  \(.dispatcher) \(.arg)"' | fuzzel --dmenu --prompt="Keybinds: "
bind = $mainMod SHIFT, B, exec, pkill waybar || waybar
bind = $mainMod, N, exec, swaync-client -d
bind = $mainMod SHIFT, N, exec, swaync-client -t
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# applications
bind = $mainMod SHIFT, D, exec, discord

# special workspaces
bind = $mainMod SHIFT, S, togglespecialworkspace, spotify
bind = $mainMod, grave, togglespecialworkspace, terminal
bind = $mainMod SHIFT, grave, movetoworkspace, special:terminal

# screenshots
bind = ,Print, exec, grim - | wl-copy
bind = $mainMod CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod SHIFT, G, exec, record-gif

# focus movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# focus floating/tiled windows
bind = CTRL ALT, up, exec, hyprctl dispatch focuswindow floating
bind = CTRL ALT, down, exec, hyprctl dispatch focuswindow tiled

# workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move to workspace (silent)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod CTRL, c, movetoworkspace, empty

# window movement
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# window resizing (hold to repeat)
binde = $mainMod CTRL, left, resizeactive, -80 0
binde = $mainMod CTRL, right, resizeactive, 80 0
binde = $mainMod CTRL, up, resizeactive, 0 -80
binde = $mainMod CTRL, down, resizeactive, 0 80
binde = $mainMod CTRL, h, resizeactive, -80 0
binde = $mainMod CTRL, j, resizeactive, 0 80
binde = $mainMod CTRL, k, resizeactive, 0 -80
binde = $mainMod CTRL, l, resizeactive, 80 0

# window positioning (hold to repeat)
binde = $mainMod ALT, left, moveactive,  -80 0
binde = $mainMod ALT, right, moveactive, 80 0
binde = $mainMod ALT, up, moveactive, 0 -80
binde = $mainMod ALT, down, moveactive, 0 80
binde = $mainMod ALT, h, moveactive,  -80 0
binde = $mainMod ALT, j, moveactive, 0 80
binde = $mainMod ALT, k, moveactive, 0 -80
binde = $mainMod ALT, l, moveactive, 0 80

# media controls
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioMute, exec, pamixer -t
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5

bind = $mainMod, F7, exec, playerctl previous
bind = $mainMod, F8, exec, playerctl play-pause
bind = $mainMod, F9, exec, playerctl next
bind = $mainMod, F10, exec, pamixer -t
binde = $mainMod, F11, exec, pamixer -d 5
binde = $mainMod, F12, exec, pamixer -i 5

# mouse workspace switching
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
